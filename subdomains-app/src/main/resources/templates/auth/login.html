<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Log In</title></head>
<body>
<main layout:fragment="content">
    <div class="auth-container">
        <h2>Log In</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <form th:action="@{/auth/login}" method="post" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autofocus
                       placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required
                       placeholder="Your password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Log In</button>
        </form>

        <div class="auth-alt-links">
            <a th:href="@{/auth/forgot-password}">Forgot password?</a>
            <span class="separator">&middot;</span>
            <a th:href="@{/auth/magic-link}">Log in with a magic link</a>
            <span class="separator">&middot;</span>
            <a th:href="@{/auth/register}">Create an account</a>
        </div>
    </div>
</main>
</body>
</html>
