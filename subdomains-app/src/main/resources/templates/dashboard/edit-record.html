<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Edit DNS Record</title></head>
<body>
<main layout:fragment="content">
    <div class="auth-container" style="max-width: 600px;">
        <h2>Edit DNS Record</h2>
        <p>Editing record on <strong th:text="${subdomain.fullDomain}"></strong></p>

        <form th:action="@{'/dashboard/records/' + ${recordForm.id} + '/edit'}"
              method="post" th:object="${recordForm}" class="auth-form">
            <div class="form-group">
                <label for="recordType">Type</label>
                <select id="recordType" th:field="*{recordType}" required>
                    <option th:each="type : ${recordTypes}"
                            th:value="${type}"
                            th:text="${type.code + ' — ' + type.displayName}"></option>
                </select>
            </div>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" th:field="*{name}" required>
            </div>
            <div class="form-group">
                <label for="value">Value</label>
                <input type="text" id="value" th:field="*{value}" required>
            </div>
            <div class="form-group">
                <label for="ttl">TTL</label>
                <select id="ttl" th:field="*{ttl}">
                    <option value="60">1 min</option>
                    <option value="300">5 min</option>
                    <option value="3600">1 hour</option>
                    <option value="14400">4 hours</option>
                    <option value="86400">24 hours</option>
                </select>
            </div>
            <div class="form-group">
                <label for="priority">Priority (MX only)</label>
                <input type="number" id="priority" th:field="*{priority}" min="0" max="65535">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a th:href="@{/dashboard}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
