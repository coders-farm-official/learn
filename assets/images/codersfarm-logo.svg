<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="#2d3436"/>

  <!-- Glasses frame - left lens -->
  <rect x="28" y="58" width="64" height="48" rx="12" stroke="#4fc1ff" stroke-width="5" fill="none"/>
  <!-- Glasses frame - right lens -->
  <rect x="108" y="58" width="64" height="48" rx="12" stroke="#4fc1ff" stroke-width="5" fill="none"/>
  <!-- Glasses bridge -->
  <path d="M92 78 C96 68, 104 68, 108 78" stroke="#4fc1ff" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Glasses left arm -->
  <line x1="28" y1="76" x2="14" y2="72" stroke="#4fc1ff" stroke-width="5" stroke-linecap="round"/>
  <!-- Glasses right arm -->
  <line x1="172" y1="76" x2="186" y2="72" stroke="#4fc1ff" stroke-width="5" stroke-linecap="round"/>

  <!-- Left lens: < / -->
  <text x="42" y="90" font-family="monospace" font-weight="700" font-size="26" fill="#4ec9b0">&lt;/</text>
  <!-- Right lens: /> -->
  <text x="118" y="90" font-family="monospace" font-weight="700" font-size="26" fill="#4ec9b0">/&gt;</text>

  <!-- Swirl / flourish under glasses -->
  <path d="M60 118 C70 128, 90 132, 100 124 C110 116, 130 120, 140 130" stroke="#4fc1ff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Text: CODERS FARM -->
  <text x="100" y="162" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="22" fill="#ffffff" letter-spacing="2">CODERS</text>
  <text x="100" y="184" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="22" fill="#4ec9b0" letter-spacing="2">FARM</text>
</svg>
